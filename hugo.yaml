baseURL: "https://erichsiao1106.github.io/"
title: "Eric Hsiao | IC Design Engineer"
paginate: 10
theme: PaperMod

languageCode: zh-tw
defaultContentLanguage: zh-tw

enableRobotsTXT: true
buildDrafts: false
buildFuture: true
buildExpired: false
enableEmoji: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - identifier: about
      name: "關於我"
      url: /about/
      weight: 10
    - identifier: projects
      name: "作品集"
      url: /projects/
      weight: 20
    - identifier: blog
      name: "部落格"
      url: /blog/
      weight: 30
    - identifier: bible
      name: "聖經"
      url: /bible/
      weight: 40
    - identifier: fandeng
      name: "樊登讀書"
      url: /fandeng/
      weight: 45
    - identifier: english
      name: "精通英語"
      url: /english/
      weight: 47
    - identifier: search
      name: "搜尋"
      url: /search/
      weight: 50

params:
  env: production
  description: "IC Design Engineer | 數位工作術 | AI 應用"
  author: "Eric Hsiao"
  mainSections: ["bible", "fandeng", "english", "blog"]

  defaultTheme: auto
  ShowThemeToggle: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false

  profileMode:
    enabled: true
    title: "嗨，我是 Eric Hsiao 👋"
    subtitle: |
      IC Design Engineer，專注數位前端設計（RTL / CDC / 驗證）。
      同時用 Claude API 打造 EDA 工具鏈，探索 AI × IC 設計的交叉點。
    imageUrl: "/images/profile.png"
    imageWidth: 160
    imageHeight: 160
    imageTitle: "Eric Hsiao"
    buttons:
      - name: "關於我"
        url: /about/
      - name: "作品集"
        url: /projects/
      - name: "部落格"
        url: /blog/

  socialIcons:
    - name: github
      url: "https://github.com/erichsiao1106"
    - name: email
      url: "mailto:erichsiao801106@gmail.com"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  assets:
    favicon: "/images/favicon.ico"

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true
